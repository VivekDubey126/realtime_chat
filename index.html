<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wassup chat app</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <section class="chat__section">
        <div class="brand">
            <div class="brand__logo">
                <img height="40" src="/wassup.png" alt="">
                <h1>Wassup</h1>
            </div>
            <div id="online-count" class="online-count">Online: 0</div>
            <button id="search-toggle" title="Search Messages" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left:10px;">🔍</button>
            <button id="theme-toggle" title="Toggle Dark Mode" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left:10px;">🌙</button>
            <button id="clear-btn" title="Clear Chat" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left:10px;">🗑️</button>
        </div>
        <div id="search-bar" class="search-bar hidden">
            <input type="text" id="search-input" placeholder="Search in chat...">
        </div>
        <div id="typing-indicator" class="typing-indicator"></div>
        <div class="message__area"></div>
        <button id="scroll-bottom-btn" class="scroll-bottom-btn hidden" title="Scroll to bottom">↓</button>
        <div class="input__area">
            <div class="input__wrapper">
                <button id="emoji-btn" title="Send Emoji">😊</button>
                <button id="file-btn" title="Send Image">➕</button>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <textarea id="textarea" cols="30" rows="1" placeholder="Write a message..."></textarea>
            </div>
            <div id="emoji-picker" class="emoji-picker hidden">
                <span class="emoji">😀</span><span class="emoji">😂</span><span class="emoji">😍</span><span class="emoji">🔥</span><span class="emoji">🙌</span><span class="emoji">🎉</span><span class="emoji">👍</span><span class="emoji">❤️</span><span class="emoji">✨</span><span class="emoji">🚀</span>
            </div>
        </div>
    </section>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>

</html>
