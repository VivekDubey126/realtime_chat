<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Weather</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="weather-card">
    <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false" id="search-input">
        <button id="search-btn">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>
    <div class="error" id="error-msg">Invalid city name</div>
    
    <div class="weather" id="weather-container">
        <div class="weather-icon" id="weather-icon">
            <!-- Default Sunny SVG -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </div>
        <h1 id="temp">--°C</h1>
        <h2 id="city">City Name</h2>
        
        <div class="details">
            <div class="col">
                <svg viewBox="0 0 24 24"><path d="M12 20a6 6 0 0 1-6-6c0-4 6-10.75 6-10.75S18 10 18 14a6 6 0 0 1-6 6zm0-14.36c-1.34 1.83-4 5.56-4 8.36a4 4 0 1 0 8 0c0-2.8-2.66-6.53-4-8.36z"/></svg>
                <div>
                    <p class="humidity" id="humidity">--%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.56a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm5.11 3.44a2 2 0 0 0-2.83 0l-.4.4a2 2 0 0 0 0 2.83 2 2 0 0 0 2.83 0l.4-.4a2 2 0 0 0 0-2.83zm-10.22 0a2 2 0 0 0-2.83 2.83l.4.4a2 2 0 0 0 2.83-2.83l-.4-.4zm10.61 5.67h-11a2 2 0 0 0 0 4h11a2 2 0 0 0 0-4z"/></svg>
                <div>
                    <p class="wind" id="wind">-- km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
